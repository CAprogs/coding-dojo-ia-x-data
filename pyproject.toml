[project]
name = "paris-events-analyzer"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "dotenv>=0.9.9",
    "minio>=7.2.15",
    "requests-cache>=1.2.1",
    "rich>=14.0.0",
]

[dependency-groups]
dev = [
    "commitizen>=4.8.3",
    "mypy>=1.20.2",
    "pre-commit>=4.2.0",
    "ruff>=0.15.11",
    "rust-just>=1.40.0",
]

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "semver2"
version = "0.1.1"
update_changelog_on_bump = true
bump_message = "upgrade $current_version → $new_version"

[tool.ruff]
exclude = [
    ".bzr", ".direnv", ".eggs", ".git", ".git-rewrite", ".hg",
    ".ipynb_checkpoints", ".mypy_cache", ".nox", ".pants.d", ".pyenv",
    ".pytest_cache", ".pytype", ".ruff_cache", ".svn", ".tox", ".venv",
    ".vscode", "__pypackages__", "_build", "buck-out", "build", "dist",
    "node_modules", "site-packages", "venv", ".pytest_cache", "__pycache__",
]
fix = true
required-version = ">=0.6.8"
line-length = 120
indent-width = 4
output-format = "concise"

[tool.ruff.lint]
select = [
    "E4", "E5", "E7", "F", "UP", "D", "N", "S", "B", "PT",
    "RUF005", "RUF019", "PLR1711", "PLR1722", "PLR1730", "PLR2044",
    "PLR5501", "ARG"
]
ignore = ["D300", "D206", "S608"]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "D104"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
lines-after-imports = 2
length-sort-straight = true
length-sort = true
no-sections = true

[tool.ruff.format]
exclude = ["__init__.py"]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = true
line-ending = "auto"
